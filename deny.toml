[advisories]
ignore = [
    # Timing attack on RSA.
    # Delta Chat does not use RSA for new keys
    # and this requires precise measurement of the decryption time by the attacker.
    # There is no fix at the time of writing this (2023-11-28).
    # <https://rustsec.org/advisories/RUSTSEC-2023-0071>
    "RUSTSEC-2023-0071",

    # Unmaintained paste
    "RUSTSEC-2024-0436",

    # Timing side channel in ml-dsa dependency of rPGP.
    # We enable PQC for encryption rather than signatures.
    # <https://rustsec.org/advisories/RUSTSEC-2025-0144>
    "RUSTSEC-2025-0144",
]

